name: Release

# Publishes the package to npm when a GitHub release is published,
# or manually via workflow_dispatch. Uses npm Trusted Publishing (OIDC)
# — no NPM_TOKEN secret required.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # npm OIDC trusted publishing needs npm >= 11.5.1; the bundled npm is older.
      - name: Use an OIDC-capable npm
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Publish to npm
        working-directory: package
        run: npm publish --access public --provenance
